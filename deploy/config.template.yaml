model:
  default: gpt-4o-mini
  provider: custom
  base_url: https://api.openai.com/v1
agent:
  max_turns: 60
  verbose: false
  reasoning_effort: none
streaming:
  enabled: false
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
mcp_servers:
  matzip:
    command: __APP_DIR__/mcp/.venv/bin/python
    args:
      - __APP_DIR__/mcp/matzip_mcp.py
    env:
      DATABASE_URL: "postgresql://hermes:hermes1234@localhost:5432/hermes"
      GOOGLE_MAPS_API_KEY: "__GOOGLE_MAPS_API_KEY__"
      SLACK_BOT_TOKEN: "__SLACK_BOT_TOKEN__"
      SLACK_CHANNEL: "__SLACK_CHANNEL__"
      PROXIMITY_RADIUS_METERS: "500"
      HOME_LAT: "37.4878"
      HOME_LNG: "126.9803"
  vault:
    command: __APP_DIR__/mcp/.venv/bin/python
    args:
      - __APP_DIR__/mcp/vault_mcp.py
    env:
      VAULT_DIR: "__VAULT_DIR__"
      VAULT_GIT_SYNC: "1"
